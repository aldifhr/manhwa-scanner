name: Manga Cron Job

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check-manga:
    runs-on: ubuntu-latest

    steps:
      - name: Show UTC Time
        run: echo "Triggered at $(date -u)"

      - name: Call Cron API
        run: |
          echo "Calling API..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron")

          echo "$RESPONSE"

          STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d":" -f2)

          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Cron failed with status $STATUS"
            exit 1
          fi

          echo "✅ Cron success!"