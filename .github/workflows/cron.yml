name: Manga Cron Job

on:
  schedule:
    - cron: "*/5 * * * *"  # setiap 5 menit
  workflow_dispatch:        # bisa trigger manual dari GitHub

jobs:
  check-manga:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cron endpoint
        run: |
          curl -X GET "${{ secrets.APP_URL }}/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail \
            --silent \
            --show-error
