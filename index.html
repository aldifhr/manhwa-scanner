<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ikiru · Bot Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f7f6f3;
      --surface:  #ffffff;
      --border:   #e8e6e0;
      --text:     #1a1916;
      --muted:    #8c8982;
      --accent:   #1a1916;
      --green:    #2d6a4f;
      --green-bg: #d8f3dc;
      --red:      #9b2226;
      --red-bg:   #fde8e8;
      --amber:    #7d4e13;
      --amber-bg: #fef3cd;
      --blue:     #1d4e89;
      --blue-bg:  #dbeafe;
      --radius:   6px;
      --mono:     'DM Mono', monospace;
      --sans:     'DM Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.02em;
    }
    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(.8); }
    }
    .logo-dot.offline { background: var(--red); animation: none; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .last-updated {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .btn-refresh {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .03em;
    }
    .btn-refresh:hover { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-refresh.loading { opacity: .5; pointer-events: none; }

    /* ── Layout ── */
    main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Stat Cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: box-shadow .2s;
    }
    .stat-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .stat-label {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .stat-value.green { color: var(--green); }
    .stat-value.red   { color: var(--red); }
    .stat-value.amber { color: var(--amber); }

    /* ── Two-col layout ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 680px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
    }
    .badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .card-body { padding: 0; }

    /* ── Whitelist list ── */
    .manga-list { list-style: none; }
    .manga-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      transition: background .1s;
    }
    .manga-item:last-child { border-bottom: none; }
    .manga-item:hover { background: var(--bg); }
    .manga-index {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      min-width: 18px;
    }
    .manga-name { flex: 1; }

    /* ── Guild list ── */
    .guild-list { list-style: none; }
    .guild-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .guild-item:last-child { border-bottom: none; }
    .guild-item:hover { background: var(--bg); }
    .guild-info { flex: 1; min-width: 0; }
    .guild-id {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .guild-channel {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }
    .status-pill {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .status-pill.active { background: var(--green-bg); color: var(--green); }
    .status-pill.invalid { background: var(--red-bg); color: var(--red); }

    /* ── Log ── */
    .log-card { margin-bottom: 0; }
    .log-list { list-style: none; }
    .log-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      transition: background .1s;
    }
    .log-item:last-child { border-bottom: none; }
    .log-item:hover { background: var(--bg); }
    .log-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      padding-top: 1px;
    }
    .log-msg { line-height: 1.5; }
    .log-tag {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .log-tag.sent    { background: var(--green-bg); color: var(--green); }
    .log-tag.skipped { background: var(--amber-bg); color: var(--amber); }
    .log-tag.failed  { background: var(--red-bg); color: var(--red); }
    .log-tag.info    { background: var(--blue-bg); color: var(--blue); }

    /* ── Empty / loading states ── */
    .empty {
      padding: 32px 18px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }
    .skeleton-line {
      height: 12px;
      background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
      background-size: 200% 100%;
      border-radius: 4px;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Config banner ── */
    .config-banner {
      background: var(--amber-bg);
      border: 1px solid #f6d860;
      border-radius: var(--radius);
      padding: 12px 18px;
      font-size: 12px;
      color: var(--amber);
      font-family: var(--mono);
      margin-bottom: 24px;
      display: none;
    }
    .config-banner.show { display: block; }
    .config-banner code {
      background: rgba(0,0,0,.08);
      padding: 1px 5px;
      border-radius: 3px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot" id="statusDot"></div>
    ikiru · bot monitor
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="btn-refresh" id="btnRefresh" onclick="loadAll()">↻ refresh</button>
  </div>
</header>

<main>
  <!-- Config warning -->
  <div class="config-banner" id="configBanner">
    ⚠ Set <code>API_BASE</code> di baris pertama script untuk mengarahkan ke API kamu.
  </div>

  <!-- Stats -->
  <div class="section-label">cron terakhir</div>
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-label">Sent</div><div class="stat-value green" id="statSent">—</div></div>
    <div class="stat-card"><div class="stat-label">Skipped</div><div class="stat-value amber" id="statSkipped">—</div></div>
    <div class="stat-card"><div class="stat-label">Failed</div><div class="stat-value red" id="statFailed">—</div></div>
    <div class="stat-card"><div class="stat-label">Duration</div><div class="stat-value" id="statDuration">—</div></div>
  </div>

  <!-- Whitelist + Guilds -->
  <div class="two-col">
    <div>
      <div class="section-label">whitelist manga</div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">Manga terpantau</span>
          <span class="badge" id="whitelistCount">0</span>
        </div>
        <div class="card-body">
          <ul class="manga-list" id="mangaList">
            <li class="empty">memuat...</li>
          </ul>
        </div>
      </div>
    </div>
    <div>
      <div class="section-label">guild & channel</div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">Server aktif</span>
          <span class="badge" id="guildCount">0</span>
        </div>
        <div class="card-body">
          <ul class="guild-list" id="guildList">
            <li class="empty">memuat...</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Activity log -->
  <div class="section-label">log aktivitas</div>
  <div class="card log-card">
    <div class="card-header">
      <span class="card-title">Riwayat cron</span>
      <span class="badge" id="logCount">0 entries</span>
    </div>
    <div class="card-body">
      <ul class="log-list" id="logList">
        <li class="empty">memuat...</li>
      </ul>
    </div>
  </div>
</main>

<script>
  // ════════════════════════════════════════════
  // CONFIG — ganti sesuai URL deployment kamu
  // ════════════════════════════════════════════
  const API_BASE = "https://ikiru-bots.vercel.app"; // contoh: "https://your-app.vercel.app"

  // Endpoint yang perlu kamu buat di backend:
  //   GET /api/status      → { sent, skipped, failed, duration, timestamp }
  //   GET /api/whitelist   → { items: string[] }
  //   GET /api/guilds      → { guilds: { guildId, channelId, valid }[] }
  //   GET /api/logs        → { logs: { time, message, tag }[] }
  // ════════════════════════════════════════════

  const $ = (id) => document.getElementById(id);
  const POLL_INTERVAL = 30_000; // auto-refresh tiap 30 detik
  let pollTimer = null;

  // ── Helpers ──────────────────────────────────
  function fmt(date) {
    return new Intl.DateTimeFormat("id-ID", {
      hour: "2-digit", minute: "2-digit", second: "2-digit"
    }).format(date);
  }

  function timeAgo(isoString) {
    const diff = Date.now() - new Date(isoString).getTime();
    const s = Math.floor(diff / 1000);
    if (s < 60)  return `${s}d lalu`;
    if (s < 3600) return `${Math.floor(s/60)}m lalu`;
    return `${Math.floor(s/3600)}j lalu`;
  }

  async function apiFetch(path) {
    if (!API_BASE) throw new Error("API_BASE belum diset");
    const r = await fetch(`${API_BASE}${path}`, {
      headers: { Authorization: `Bearer ${window.__CRON_SECRET || ""}` }
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }

  // ── Skeleton loading ─────────────────────────
  function skeletonItems(ul, n = 4) {
    ul.innerHTML = Array.from({ length: n }, (_, i) =>
      `<li style="padding:12px 18px;border-bottom:1px solid var(--border)">
        <div class="skeleton-line" style="width:${60 + (i % 3)*15}%;height:11px"></div>
      </li>`
    ).join("");
  }

  // ── Render: Stats ─────────────────────────────
  function renderStats(data) {
    const statusDot = $("statusDot");

    if (!data) {
      ["statSent","statSkipped","statFailed","statDuration"].forEach(id => $(id).textContent = "—");
      statusDot.className = "logo-dot offline";
      return;
    }

    $("statSent").textContent     = data.sent     ?? "—";
    $("statSkipped").textContent  = data.skipped  ?? "—";
    $("statFailed").textContent   = data.failed   ?? "—";
    $("statDuration").textContent = data.duration ? `${data.duration}s` : "—";

    statusDot.className = "logo-dot" + (data.failed > 0 ? " offline" : "");
  }

  // ── Render: Whitelist ─────────────────────────
  function renderWhitelist(data) {
    const list = $("mangaList");
    const items = data?.items ?? [];
    $("whitelistCount").textContent = items.length;

    if (!items.length) {
      list.innerHTML = `<li class="empty">Whitelist kosong</li>`;
      return;
    }
    list.innerHTML = items.map((name, i) =>
      `<li class="manga-item">
        <span class="manga-index">${String(i+1).padStart(2,"0")}</span>
        <span class="manga-name">${escHtml(name)}</span>
      </li>`
    ).join("");
  }

  // ── Render: Guilds ────────────────────────────
  function renderGuilds(data) {
    const list = $("guildList");
    const guilds = data?.guilds ?? [];
    $("guildCount").textContent = guilds.length;

    if (!guilds.length) {
      list.innerHTML = `<li class="empty">Belum ada guild terdaftar</li>`;
      return;
    }
    list.innerHTML = guilds.map(g =>
      `<li class="guild-item">
        <div class="guild-info">
          <div class="guild-id">${escHtml(g.guildId)}</div>
          <div class="guild-channel">#${escHtml(g.channelId)}</div>
        </div>
        <span class="status-pill ${g.valid ? "active" : "invalid"}">${g.valid ? "aktif" : "invalid"}</span>
      </li>`
    ).join("");
  }

  // ── Render: Logs ──────────────────────────────
  function renderLogs(data) {
    const list = $("logList");
    const logs = data?.logs ?? [];
    $("logCount").textContent = `${logs.length} entries`;

    if (!logs.length) {
      list.innerHTML = `<li class="empty">Belum ada log</li>`;
      return;
    }
    list.innerHTML = logs.map(l =>
      `<li class="log-item">
        <span class="log-time">${fmt(new Date(l.time))}</span>
        <span class="log-msg">${escHtml(l.message)}</span>
        <span class="log-tag ${l.tag}">${l.tag}</span>
      </li>`
    ).join("");
  }

  // ── Error state ───────────────────────────────
  function renderError(ul, msg) {
    ul.innerHTML = `<li class="empty" style="color:var(--red)">${msg}</li>`;
  }

  // ── Main load ─────────────────────────────────
  async function loadAll() {
    const btn = $("btnRefresh");
    btn.classList.add("loading");
    btn.textContent = "↻ memuat";

    // Check config
    if (!API_BASE) {
      $("configBanner").classList.add("show");
      // Dev: render mock data so layout is visible
      renderStats({ sent: 3, skipped: 1, failed: 0, duration: "4.2" });
      renderWhitelist({ items: ["Solo Leveling", "Lookism", "Omniscient Reader"] });
      renderGuilds({ guilds: [
        { guildId: "123456789012345678", channelId: "987654321098765432", valid: true },
        { guildId: "111222333444555666", channelId: "666555444333222111", valid: false },
      ]});
      renderLogs({ logs: [
        { time: new Date().toISOString(), message: "Solo Leveling ch.200 → Guild A", tag: "sent" },
        { time: new Date(Date.now()-60000).toISOString(), message: "Lookism sudah dikirim sebelumnya", tag: "skipped" },
        { time: new Date(Date.now()-120000).toISOString(), message: "Cron dimulai", tag: "info" },
      ]});
      btn.classList.remove("loading");
      btn.textContent = "↻ refresh";
      return;
    }

    // Skeleton while loading
    skeletonItems($("mangaList"));
    skeletonItems($("guildList"), 3);
    skeletonItems($("logList"), 5);

    const results = await Promise.allSettled([
      apiFetch("/api/status"),
      apiFetch("/api/whitelist"),
      apiFetch("/api/guilds"),
      apiFetch("/api/logs"),
    ]);

    const [statusRes, whitelistRes, guildsRes, logsRes] = results;

    renderStats(statusRes.status === "fulfilled" ? statusRes.value : null);
    if (whitelistRes.status === "fulfilled") renderWhitelist(whitelistRes.value);
    else renderError($("mangaList"), "Gagal memuat whitelist");
    if (guildsRes.status === "fulfilled") renderGuilds(guildsRes.value);
    else renderError($("guildList"), "Gagal memuat guilds");
    if (logsRes.status === "fulfilled") renderLogs(logsRes.value);
    else renderError($("logList"), "Gagal memuat logs");

    $("lastUpdated").textContent = `updated ${fmt(new Date())}`;
    btn.classList.remove("loading");
    btn.textContent = "↻ refresh";
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ── Auto-poll ─────────────────────────────────
  function startPoll() {
    clearInterval(pollTimer);
    pollTimer = setInterval(loadAll, POLL_INTERVAL);
  }

  // ── Init ──────────────────────────────────────
  loadAll();
  startPoll();
</script>

</body>
</html>
