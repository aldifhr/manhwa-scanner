<!doctype html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ManhwaScanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./dashboard.css" />
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div id="loadingScreen">
        <div class="spin"></div>
        <p style="font:500 11px var(--mono);color:var(--muted)">Loading<span class="loading-dots"></span></p>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>ManhwaScanner</h2>
            <p>Enter password to access the dashboard.</p>
            <form onsubmit="event.preventDefault(); submitPassword();">
                <input type="password" id="passwordInput" placeholder="Password" autocomplete="off" />
                <button type="submit" class="btn-primary">Sign in</button>
            </form>
        </div>
    </div>


    <div class="app-shell">
        <div class="main-area">
            <header class="topbar">
                <div class="topbar-left">
                    <div class="brand-dot" id="statusDot"></div>
                    <span id="topStatusText">Initializing</span>
                    <select id="pollInterval" onchange="setPollInterval()" class="topbar-select">
                        <option value="60000">1m</option>
                        <option value="120000">2m</option>
                    </select>
                    <button type="button" id="btnAutoRefresh" onclick="toggleAutoRefresh()" class="topbar-toggle">auto: on</button>
                </div>
                <div class="topbar-right">
                    <span class="topbar-time" id="topLastUpdated">--:--:--</span>
                </div>
            </header>

            <main class="app-main">
                <div class="alert" id="alertBox"></div>

                <!-- Cron Status -->
                <div class="cron-bar" id="lastCronBar">
                    <div class="cron-countdown-block">
                        <div class="cron-label">Next run</div>
                        <div class="cron-countdown" id="cronCountdown">--:--</div>
                    </div>
                    <div class="cron-meta">
                        <div class="cron-meta-item">
                            <span class="cron-label">Last run</span>
                            <span class="cron-value" id="lastCronTime">--:--:--</span>
                            <span class="cron-sub" id="statDuration">--</span>
                        </div>
                    </div>
                    <div class="cron-stats">
                        <div class="cron-stat">
                            <span class="cron-stat-value g" id="lastCronSent">-</span>
                            <span class="cron-stat-label">Sent</span>
                        </div>
                        <div class="cron-stat">
                            <span class="cron-stat-value a" id="lastCronSkipped">-</span>
                            <span class="cron-stat-label">Skip</span>
                        </div>
                        <div class="cron-stat">
                            <span class="cron-stat-value r" id="lastCronFailed">-</span>
                            <span class="cron-stat-label">Fail</span>
                        </div>
                    </div>

                </div>

                <!-- KPIs -->
                <div class="kpi-row">
                    <div class="kpi">
                        <div class="kpi-label">Health</div>
                        <div class="kpi-value" id="overviewHealth">-</div>
                        <div class="kpi-sub" id="overviewLastRun">--</div>
                    </div>
                    <div class="kpi">
                        <div class="kpi-label">Tracking</div>
                        <div class="kpi-value" id="overviewWhitelist">-</div>
                        <div class="kpi-sub">Titles</div>
                    </div>
                    <div class="kpi">
                        <div class="kpi-label">Success rate</div>
                        <div class="kpi-value" id="statSuccessRate">--%</div>
                        <div class="kpi-sub" id="overviewSent24h">- sent (24h)</div>
                    </div>
                    <div class="kpi" id="fastCronCard" style="display:none">
                        <div class="kpi-label">FastCron</div>
                        <div class="kpi-value" id="overviewFastCron">-</div>
                        <div class="kpi-sub">
                            <span>Scheduler</span>
                            <span id="activeWorkersBadge" style="display:none"></span>
                        </div>
                    </div>
                </div>

                <!-- Charts Row -->
                <div class="charts-grid">
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">Activity trend</span>
                            <select id="chartRange" class="panel-select" onchange="renderTrendChart()">
                                <option value="24h">24h</option>
                                <option value="7d">7d</option>
                            </select>
                        </div>
                        <div class="panel-body">
                            <div class="chart-box"><canvas id="chartTrend"></canvas></div>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">Sources</span>
                        </div>
                        <div class="panel-body">
                            <div class="chart-box chart-box--small"><canvas id="chartSourceHealth"></canvas></div>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">Source health</span>
                            <span class="badge" id="sourceHealthCount">0</span>
                        </div>
                        <div class="panel-body">
                            <ul id="sourceHealthList" class="list-plain"></ul>
                        </div>
                    </div>
                </div>

                <!-- Logs + Recent -->
                <div class="data-grid">
                    <div class="panel panel--recent">
                        <div class="panel-header">
                            <span class="panel-title">Recent dispatch</span>
                            <span class="badge" id="recentCount">0</span>
                        </div>
                        <ul class="list-scroll" id="recentList">
                            <li class="empty">None</li>
                        </ul>
                    </div>
                </div>



                <span id="statSent" style="display:none"></span>
                <span id="statSkipped" style="display:none"></span>
                <span id="statDedupe" style="display:none"></span>
                <span id="statFailed" style="display:none"></span>
                <div id="recommendationsPanel"></div>

                <!-- Hidden timers for JS -->
                <span id="t1" style="display:none"></span>
                <span id="t2" style="display:none"></span>
                <span id="t2b" style="display:none"></span>
                <span id="t3" style="display:none"></span>
                <span id="t3b" style="display:none"></span>
                <span id="t4" style="display:none"></span>
                <span id="t5" style="display:none"></span>
                <span id="t6" style="display:none"></span>

                <span id="lastUpdated" style="display:none"></span>
                <span id="lastCronDuration" style="display:none"></span>
                <span id="lastCronDedupe" style="display:none"></span>
            </main>
        </div>
    </div>

    <script type="module" src="./script.js" defer></script>
</body>
</html>
